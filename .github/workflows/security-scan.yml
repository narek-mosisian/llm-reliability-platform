name: Security Scan CI

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - ".github/workflows/**"
      - ".github/dependabot.yml"
      - ".github/CODEOWNERS"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - ".github/workflows/**"
      - ".github/dependabot.yml"
      - ".github/CODEOWNERS"

permissions:
  contents: read
  security-events: write # so that CodeQL can write results to GitHub's security/code scanning area
  actions: read # Workflow is permitted to read Actions metadata (required for CodeQL/internal GitHub analysis)

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false # If a matrix run fails, the others are not immediately aborted.
      matrix:
        language:
          - python
          - javascript-typescript

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended # extended security checks

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check for committed local artifacts
        run: |
          set -euo pipefail

          forbidden_paths=(
            "apps/api/.venv"
            "apps/web/node_modules"
            "apps/web/.next"
            ".env"
          )

          for path in "${forbidden_paths[@]}"; do
            if [ -e "${path}" ]; then # checks whether this path exists
              echo "Forbidden local artifact found: ${path}"
              exit 1
            fi
          done

          echo "No forbidden local artifacts found."

      - name: Check for placeholder secrets
        run: |
          set -euo pipefail

          matches="$(grep -RIlE "(sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9_]{20,}|BEGIN (RSA|OPENSSH|PRIVATE) KEY)" \
          # Recursively searches the repository for patterns that look like secrets.
          # In this process, binary files are ignored, filenames containing matches are output, and extended regular expressions are used.
          # The regex pattern "sk-[A-Za-z0-9]{20,}" searches for strings that could look like OpenAI API keys.
          # The regex pattern "ghp_[A-Za-z0-9_]{20,}" searches for GitHub Personal Access Tokens that start with ghp_.
          # The regex pattern "BEGIN (RSA|OPENSSH|PRIVATE) KEY" searches for private SSH/RSA/private key blocks.
            # These folders are ignored during searches:
            --exclude-dir=.git \
            --exclude-dir=.next \
            --exclude-dir=node_modules \
            --exclude-dir=.venv \
            . || true)" # search starting from the current repository folder

          if [ -n "${matches}" ]; then
            echo "Potential secret-like value found in:"
            echo "${matches}"
            exit 1
          fi

          echo "No obvious secret-like values found."
